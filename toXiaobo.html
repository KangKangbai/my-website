<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>toXiaobo</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000;
            color: #fff; font-family: 'Noto Sans SC', sans-serif;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        /* ---------------- Canvas 粒子背景 ---------------- */
        #bg-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none;
        }

        /* ---------------- 登录界面 ---------------- */
        #login-screen {
            position: absolute; width: 100%; height: 100%; z-index: 100;
            background: radial-gradient(circle at center, #1c1c2b 0%, #0d0d12 80%, #000000 100%);
            display: flex; justify-content: center; align-items: center; transition: opacity 1s ease;
        }
        .login-box {
            text-align: center; background: rgba(255, 255, 255, 0.05); padding: 40px 5%;
            width: 80%; max-width: 350px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .login-title { font-size: 22px; color: #ffe6e6; margin-bottom: 25px; letter-spacing: 3px; }
        #pwd-input {
            width: 100%; max-width: 200px; box-sizing: border-box; padding: 12px 20px;
            font-size: 16px; border-radius: 8px; border: 1px solid rgba(255, 71, 87, 0.5);
            background: rgba(0, 0, 0, 0.3); color: #fff; outline: none; text-align: center;
            margin: 0 auto 20px auto; display: block; letter-spacing: 2px;
        }
        #pwd-btn {
            padding: 10px 35px; font-size: 16px; border: none; border-radius: 8px;
            background: #ff4757; color: #fff; cursor: pointer; transition: background 0.3s;
        }
        #pwd-error {
            color: #ff4757; font-size: 14px; margin-top: 15px; 
            opacity: 0; transition: opacity 0.3s; height: 20px;
        }

        /* ---------------- 3D 信封样式 ---------------- */
        #start-screen {
            perspective: 1000px; text-align: center; cursor: pointer;
            transition: opacity 1s ease; position: absolute; z-index: 20; opacity: 0; display: none;
        }
        .envelope-wrapper {
            position: relative; width: 280px; height: 180px; margin: 0 auto;
            background: #ff4757; border-radius: 0 0 10px 10px; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        #envelope { position: relative; width: 100%; height: 100%; }
        .flap {
            position: absolute; top: 0; width: 0; height: 0;
            border-left: 140px solid transparent; border-right: 140px solid transparent; border-top: 100px solid #ff4757;
            transform-origin: top; transition: transform 0.6s ease-in-out; z-index: 3;
        }
        .pocket {
            position: absolute; bottom: 0; width: 0; height: 0;
            border-left: 140px solid #ff6b81; border-right: 140px solid #ff6b81;
            border-bottom: 90px solid #ff6b81; border-top: 90px solid transparent; z-index: 4;
        }
        .letter {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 90%; height: 80%; background: #fff; transition: transform 0.6s ease-in-out;
            z-index: 2; padding: 15px; box-sizing: border-box; border-radius: 5px;
        }
        .letter-text { font-family: 'Noto Sans SC', sans-serif; color: #ff4757; font-size: 18px; font-weight: bold; line-height: 1.5; }
        .envelope-wrapper.open .flap { transform: rotateX(180deg); z-index: 1; }
        .envelope-wrapper.open .letter { transform: translate(-50%, -80px); }
        .click-hint { margin-top: 10px; font-size: 18px; color: #d1d1d1; letter-spacing: 4px; opacity: 0; }
        .click-hint.show { animation: fadeInBlink 2.5s infinite; }
        @keyframes fadeInBlink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* ---------------- 打字机 ---------------- */
        #text-screen {
            display: none; width: 85%; max-width: 700px; font-size: 24px; line-height: 2.2; 
            text-align: center; z-index: 10; opacity: 1; transition: opacity 1s;
        }
        .cinematic-char { opacity: 0; filter: blur(10px); display: inline-block; transition: opacity 0.8s ease, filter 0.8s ease; }
        .cinematic-char.show { opacity: 1; filter: blur(0); }
        .typing-cursor {
            display: inline-block; width: 2px; height: 1.2em; background-color: #ff4757;
            vertical-align: middle; margin-left: 4px; animation: blink 1s step-end infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* ---------------- 流星、爆炸与白屏转场 ---------------- */
        #meteor-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 25; display: none; overflow: hidden; pointer-events: none;
        }
        .meteor-container {
            position: absolute; top: 50%; left: 50%; width: 0; height: 0;
        }
        .meteor {
            position: absolute; width: 400px; height: 3px;
            /* 彩色拖尾：从透明过度到蓝、紫、红 */
            background: linear-gradient(to right, rgba(0,0,0,0) 0%, #00d2ff 30%, #9d4edd 60%, #ff0844 100%);
            transform-origin: right center; 
            animation: meteorStrike 2.5s ease-out forwards; /* 时间变长，速度变缓 */
        }
        /* 流星头部高光 */
        .meteor::after {
            content: ""; position: absolute; top: -4px; right: -5px; width: 11px; height: 11px; border-radius: 50%;
            background: #fff; box-shadow: 0 0 20px 8px #fff, 0 0 40px 15px #ff0844;
        }
        @keyframes meteorStrike {
            /* 起点在右上角，终点在 0,0（屏幕正中心） */
            0% { transform: translate(50vw, -50vh) rotate(135deg); opacity: 0; }
            15% { opacity: 1; }
            100% { transform: translate(0, 0) rotate(135deg); opacity: 1; }
        }
        
        /* 流星砸到中间时的光波爆炸 */
        .meteor-explosion {
            position: absolute; top: 0; left: 0; transform: translate(-50%, -50%);
            width: 15px; height: 15px; border-radius: 50%; background: #fff;
            box-shadow: 0 0 40px 20px #ff0844, 0 0 80px 40px #9d4edd;
            opacity: 0; z-index: 26;
            animation: explode 0.8s ease-out forwards;
        }
        @keyframes explode {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(60); opacity: 0; }
        }

        #white-flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 40; opacity: 0; display: none; pointer-events: none;
            transition: opacity 1s ease-in-out; /* 白屏消散也变平缓 */
        }

        /* ---------------- 告白与记忆墙 ---------------- */
        #memory-wall {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2;
            opacity: 0; transition: opacity 3s ease; pointer-events: none;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }
        
        #final-screen {
            display: none; width: 90%; text-align: center; z-index: 10; position: absolute;
            flex-direction: column; justify-content: center; align-items: center; opacity: 0;
            transition: opacity 1s ease;
        }
        .final-pre { font-size: 20px; color: #ffe6e6; opacity: 0; margin-bottom: 20px; transition: opacity 2s ease 0.5s;}
        .final-core {
            font-size: clamp(40px, 12vw, 80px); font-weight: bold; color: #ff334b; font-family: 'Dancing Script', cursive; 
            text-shadow: 0 0 20px rgba(255, 51, 75, 0.6);
            opacity: 0; transform: scale(0.8); transition: opacity 2s ease 1s, transform 0.1s ease;
        }
        #timer-box { margin-top: 30px; font-size: 16px; color: #ffcccc; opacity: 0; transition: opacity 1.5s ease 2.5s; }
        #timer-box span { font-weight: bold; color: #fff; font-size: 20px; }
        
        #replay-prompt {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            font-size: 14px; color: rgba(255,255,255,0.4); letter-spacing: 2px; cursor: pointer;
            opacity: 0; transition: opacity 1s, color 0.3s; z-index: 50; display: none;
        }
        #replay-prompt:hover { color: #fff; }

    </style>
</head>
<body>

    <audio id="bgm" loop preload="auto">
        <source src="your-romantic-music.mp3" type="audio/mpeg">
    </audio>

    <canvas id="bg-canvas"></canvas>
    <div id="memory-wall"></div>
    <div id="white-flash"></div>
    <div id="meteor-screen"></div>

    <div id="login-screen">
        <div class="login-box">
            <h2 class="login-title">身份验证</h2>
            <input type="password" id="pwd-input" placeholder="请输入专属密码" />
            <button id="pwd-btn">确 认</button>
            <div id="pwd-error">密码不对哦~</div>
        </div>
    </div>

    <div id="start-screen">
        <div class="envelope-wrapper">
            <div id="envelope">
                <div class="flap"></div>
                <div class="pocket"></div>
                <div class="letter">
                    <div class="letter-text">
                        宝宝，<br>展信佳。
                    </div>
                </div>
            </div>
        </div>
        <div class="click-hint show" id="click-hint">点击开启信封</div>
    </div>

    <div id="text-screen"></div>

    <div id="final-screen">
        <div class="final-pre" id="final-p1">往后余生，风雪是你，平淡是你，万般温柔，也全是你。</div>
        <!--<div class="final-pre" id="final-p2">我的宝宝，我的老婆。</div>-->
        <div class="final-core" id="final-core">我会一直在，只爱你。</div>
        <div id="timer-box">相伴已走过 <span id="time-d">0</span>天 <span id="time-h">0</span>时 <span id="time-m">0</span>分 <span id="time-s">0</span>秒</div>
    </div>

    <div id="replay-prompt">点这里，再看一遍</div>

    <script>
        const CORRECT_PASSWORD = "loveXiaobo"; 
        const START_DATE = new Date("2026-02-10T00:00:00"); 
        const storyLines = [
            "宝宝，回想起来，我们的相遇真的很猝不及防。",
            "寒假快要结束的那段日子，偶然相识，第一次见面牵手，第二天相拥亲吻，一切都快得猝不及防，却又无比顺理成章。",
            "原本只是无聊消遣的一次碰面，却让我遇见了这辈子最想好好留住的人。",
            "我们隔着江苏与河南的距离，是异地，相差五岁，都是不善表达却心思细腻的人，一个ESTJ，一个ISTJ，慢慢磨合，慢慢依赖。",
            "每天晚上的视频通话，是我一天里最放松、最期待的时刻。",
            "我们聊日常，聊心事，聊天马行空的碎碎念，也会分享只属于我们两个人的小秘密，那些细碎又私密的聊天，早就把彼此牢牢拴在了一起。",
            "我真的很庆幸能遇见你。",
            "在遇见你之前，我好像一直平平淡淡的生活，敷衍度日，可你的出现，悄悄改变了我。",
            "我开始期待每一天，开始有了牵挂，有了软肋，也有了坚定的偏爱。",
            "会下意识想着给你买零食，挑好看的小物件，惦记你有没有好好吃饭。",
            "而你也在用你的方式好好爱我，给我寄满满一箱的零食和温柔，花心思定制专属我们的戒指，一生只能登记一次的限定浪漫，是你明目张胆的诚意。",
            "我知道你干净又纯粹，带着满心的真诚奔向我，把最珍贵的温柔和初心都留给了我。",
            "这份偏爱，我从来都不敢辜负。",
            "异地很难，不能随时见面，不能并肩散步，偶尔也会有小矛盾、小别扭，但每次磨合过后，我们都更确定，彼此就是想要的那个人。",
            "五一到了，终于可以跨越山海相拥，不用隔着屏幕说想念，可以实实在在牵着你的手，陪着你，和你一起慢慢度过专属我们的独处时光。",
            "宝贝，短暂的异地只是暂时的。",
            "我不想只陪你走一程，我想和你慢慢来，岁岁年年，长久相伴。",
            "往后的日子，我会一直好好喜欢你，好好偏爱你，包容你的小脾气，接住你的所有情绪。",
            "不管距离多远，不管未来有多少未知，我都会坚定选择你，一次，次次，永远。",
            "始于初见，忠于心动，终于余生。",
        ];

        let viewCount = 0; 
        let hasStarted = false;
        let isFinalStage = false; 
        let audioCtx, analyser, dataArray, currentBass = 0;

        const loginScreen = document.getElementById('login-screen');
        const startScreen = document.getElementById('start-screen');
        const textScreen = document.getElementById('text-screen');
        const finalScreen = document.getElementById('final-screen');
        const replayPrompt = document.getElementById('replay-prompt');
        const bgm = document.getElementById('bgm');
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        const pwdError = document.getElementById('pwd-error');
        const meteorScreen = document.getElementById('meteor-screen');
        const whiteFlash = document.getElementById('white-flash');

        document.getElementById('pwd-btn').onclick = () => {
            if (document.getElementById('pwd-input').value === CORRECT_PASSWORD) {
                loginScreen.style.opacity = '0';
                setTimeout(() => {
                    loginScreen.style.display = 'none';
                    startScreen.style.display = 'block';
                    setTimeout(() => startScreen.style.opacity = '1', 100);
                }, 1000);
            } else {
                pwdError.style.opacity = '1';
                setTimeout(() => pwdError.style.opacity = '0', 2000);
            }
        };

        document.getElementById('pwd-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('pwd-btn').click();
        });

        startScreen.onclick = () => {
            if(hasStarted) return;
            hasStarted = true;
            document.querySelector('.envelope-wrapper').classList.add('open');
            document.getElementById('click-hint').classList.remove('show');
            document.getElementById('click-hint').style.opacity = '0';

            setTimeout(() => {
                if(!audioCtx) initAudio();
                bgm.play();
                startScreen.style.opacity = '0';
                setTimeout(() => {
                    startScreen.style.display = 'none';
                    textScreen.style.display = 'block';
                    initParticles();
                    runTypewriter();
                }, 1000);
            }, 1500); 
        };

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            const source = audioCtx.createMediaElementSource(bgm);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
        }

        let currentLine = 0;
        function runTypewriter() {
            if (currentLine >= storyLines.length) {
                textScreen.style.opacity = '0';
                setTimeout(() => {
                    textScreen.style.display = 'none';
                    runMeteorTransition(); 
                }, 1000);
                return;
            }
            
            textScreen.innerHTML = "";
            let chars = storyLines[currentLine].split('');
            let charIndex = 0;
            let cur = document.createElement('span');
            cur.className = 'typing-cursor';
            textScreen.appendChild(cur);

            function typeNextChar() {
                if (charIndex < chars.length) {
                    let s = document.createElement('span');
                    s.className = 'cinematic-char';
                    s.innerText = chars[charIndex];
                    textScreen.insertBefore(s, cur);
                    setTimeout(() => s.classList.add('show'), 20);
                    charIndex++;
                    setTimeout(typeNextChar, 150);
                } else {
                    setTimeout(() => {
                        textScreen.style.opacity = '0';
                        setTimeout(() => {
                            currentLine++;
                            textScreen.style.opacity = '1';
                            runTypewriter();
                        }, 1000);
                    }, 2000);
                }
            }
            typeNextChar();
        }

        function runMeteorTransition() {
            meteorScreen.style.display = 'block';
            meteorScreen.innerHTML = `
                <div class="meteor-container">
                    <div class="meteor"></div>
                </div>
            `;

            // 等待流星划到屏幕中心（2.5秒）
            setTimeout(() => {
                // 隐藏流星本体
                document.querySelector('.meteor').style.display = 'none';
                
                // 触发中心爆炸特效
                let explosion = document.createElement('div');
                explosion.className = 'meteor-explosion';
                document.querySelector('.meteor-container').appendChild(explosion);

                // 爆炸扩散瞬间，接上白屏闪烁
                setTimeout(() => {
                    whiteFlash.style.display = 'block';
                    setTimeout(() => whiteFlash.style.opacity = '1', 50);

                    // 在白屏掩盖下完成场景切换
                    setTimeout(() => {
                        meteorScreen.style.display = 'none';
                        showFinal();
                        
                        // 白屏平缓散去，露出正在缓缓汇聚成心形的粒子
                        whiteFlash.style.opacity = '0';
                        setTimeout(() => whiteFlash.style.display = 'none', 1200);
                    }, 600); 
                }, 200); 

            }, 2500); 
        }

        function showFinal() {
            finalScreen.style.display = 'flex';
            document.getElementById('memory-wall').style.opacity = '1';
            
            // 触发粒子向心形坐标汇聚
            isFinalStage = true; 

            setTimeout(() => {
                finalScreen.style.opacity = '1';
                document.getElementById('final-p1').style.opacity = '1';
                document.getElementById('final-p2').style.opacity = '1';
                document.getElementById('final-core').style.opacity = '1';
            }, 100);

            if (viewCount === 0) {
                replayPrompt.style.display = 'block';
                setTimeout(() => replayPrompt.style.opacity = '1', 7000);
            }
            setInterval(updateTimer, 1000);
        }

        function updateTimer() {
            const diff = new Date() - START_DATE;
            document.getElementById('time-d').innerText = Math.floor(diff / 86400000);
            document.getElementById('time-h').innerText = Math.floor((diff / 3600000) % 24);
            document.getElementById('time-m').innerText = Math.floor((diff / 60000) % 60);
            document.getElementById('time-s').innerText = Math.floor((diff / 1000) % 60);
        }

        replayPrompt.onclick = () => {
            viewCount++; 
            finalScreen.style.opacity = '0';
            document.getElementById('memory-wall').style.opacity = '0';
            replayPrompt.style.opacity = '0';
            isFinalStage = false;
            setTimeout(() => {
                finalScreen.style.display = 'none';
                replayPrompt.style.display = 'none';
                currentLine = 0;
                hasStarted = false;
                startScreen.style.display = 'block';
                startScreen.style.opacity = '1';
                particles.forEach(p => {
                    p.x = Math.random() * canvas.width;
                    p.y = Math.random() * canvas.height;
                });
            }, 1000);
        };

        // Canvas 系统
        let particles = [];
        let heartTargets = []; 

        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            heartTargets = [];
            
            let particleCount = window.innerWidth < 600 ? 60 : 120; 

            for(let i=0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * canvas.width, 
                    y: Math.random() * canvas.height,
                    vx: Math.random() - 0.5, 
                    vy: Math.random() - 0.5, 
                    size: Math.random() * 2 + 1
                });

                let t = (i / particleCount) * Math.PI * 2;
                let hx = 16 * Math.pow(Math.sin(t), 3);
                let hy = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                let scale = canvas.width < 600 ? 10 : 18; 
                heartTargets.push({
                    x: canvas.width/2 + hx * scale,
                    y: canvas.height/2 + hy * scale - 20
                });
            }
            draw();
        }

        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.15)';
            ctx.fillRect(0,0,canvas.width, canvas.height);
            
            if(analyser) {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for(let i=0; i<10; i++) sum += dataArray[i];
                currentBass = (sum / 10) / 255; 
            }

            if (isFinalStage) {
                const finalCore = document.getElementById('final-core');
                if (finalCore) {
                    let scale = 1 + currentBass * 0.15;
                    let glow = 20 + currentBass * 40;
                    finalCore.style.transform = `scale(${scale})`;
                    finalCore.style.textShadow = `0 0 ${glow}px rgba(255, 51, 75, ${0.6 + currentBass * 0.4})`;
                }
            }

            particles.forEach((p, index) => {
                if (isFinalStage) {
                    // 将聚拢速度从 0.05 降低到 0.015，产生缓慢优雅的飘落感
                    p.x += (heartTargets[index].x - p.x) * 0.015;
                    p.y += (heartTargets[index].y - p.y) * 0.015;
                    p.size = 2 + currentBass * 4; 
                    ctx.fillStyle = `rgba(255, 71, 87, ${0.5 + currentBass})`;
                } else {
                    p.x += p.vx * (1 + currentBass * 2);
                    p.y += p.vy * (1 + currentBass * 2);
                    if(p.x<0 || p.x>canvas.width) p.vx*=-1;
                    if(p.y<0 || p.y>canvas.height) p.vy*=-1;
                    ctx.fillStyle = `rgba(255, ${200 - currentBass*100}, ${200 - currentBass*100}, 0.8)`;
                }
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
            });

            ctx.strokeStyle = isFinalStage ? 'rgba(255,71,87,0.15)' : 'rgba(255,71,87,0.05)';
            for(let i=0; i<particles.length; i++) {
                for(let j=i+1; j<particles.length; j++) {
                    let d = Math.hypot(particles[i].x - particles[j].x, particles[i].y - particles[j].y);
                    let threshold = isFinalStage ? 40 : 100; 
                    if(d < threshold) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', () => {
            if(hasStarted && !isFinalStage) {
                initParticles(); 
            }
        });
    </script>
</body>
</html>
