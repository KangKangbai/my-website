<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI播报与录音记录</title>
    <style>
        /* 仿苹果极简风格 CSS */
        :root {
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --text-main: #1d1d1f;
            --text-secondary: #86868b;
            --blue: #0071e3;
            --blue-hover: #0077ed;
            --red: #ff3b30;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.04);
            max-width: 500px;
            width: 100%;
            text-align: center;
            transition: all 0.3s ease;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 30px;
        }

        /* 按钮通用样式 */
        .apple-btn {
            background: var(--blue);
            color: white;
            border: none;
            border-radius: 980px; /* 胶囊形状 */
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 80%;
            margin-bottom: 15px;
        }

        .apple-btn:hover {
            background: var(--blue-hover);
            transform: scale(1.02);
        }

        .apple-btn:disabled {
            background: #d2d2d7;
            cursor: not-allowed;
            transform: none;
        }

        /* 录音按钮特殊样式 */
        .record-btn {
            background: transparent;
            color: var(--red);
            border: 1.5px solid var(--red);
        }

        .record-btn:hover {
            background: var(--red);
            color: white;
        }

        .record-btn.recording {
            background: var(--red);
            color: white;
            animation: pulse 1.5s infinite;
        }

        /* AI 内容显示区 */
        .content-box {
            margin: 20px 0 30px 0;
            padding: 20px;
            background: #fbfbfd;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.6;
            text-align: justify;
            color: var(--text-main);
            display: none;
            border: 1px solid #e5e5ea;
        }

        /* 播放器与下载区 */
        .playback-box {
            margin-top: 20px;
            display: none;
            flex-direction: column;
            align-items: center;
        }

        audio {
            width: 100%;
            height: 40px;
            outline: none;
            margin-bottom: 15px;
        }

        .download-link {
            font-size: 14px;
            color: var(--blue);
            text-decoration: none;
        }

        .download-link:hover {
            text-decoration: underline;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 59, 48, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>今日记事</h1>

        <button id="aiBtn" class="apple-btn">获取今日趣闻</button>
        <div id="aiContent" class="content-box"></div>

        <button id="recordBtn" class="apple-btn record-btn">🔴 开始录音</button>
        
        <div id="playbackBox" class="playback-box">
            <audio id="audioPlayer" controls></audio>
            <a id="downloadLink" class="download-link" download="my_recording.webm">保存录音到本地</a>
        </div>
    </div>

    <script>
        // --- 1. AI 模型接入逻辑 (真实API接入) ---
const aiBtn = document.getElementById('aiBtn');
const aiContent = document.getElementById('aiContent');

// 【重要】在这里填入你申请的大模型 API Key
// 这里以 DeepSeek 或兼容 OpenAI 格式的 API 为例
const API_KEY = "ark-595704f6-c477-48bb-b7ac-474d27300654-4455f"; 
const API_URL = "https://ark.cn-beijing.volces.com/api/v3/chat/completions"; // 替换为对应厂商的 API 地址

aiBtn.addEventListener('click', async () => {
    if (API_KEY === 'sk-你的真实API密钥填在这里') {
        alert('请先在代码中填入真实的 API Key！');
        return;
    }

    aiBtn.disabled = true;
    aiBtn.innerText = 'AI 正在检索和总结...';
    aiContent.style.display = 'block';
    aiContent.innerText = 'AI 正在思考中，请稍候...';

    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${API_KEY}`
            },
            body: JSON.stringify({
                model: "ep-20260422164316-kjqt9", // 替换为你使用的模型名称
                messages: [
                    {
                        "role": "system",
                        "content": "你是一个新闻播报助手。请讲一件今天发生的有趣新闻或事实，并总结为500字（字数严格限定在580-520之间）。"
                    },
                    {
                        "role": "user",
                        "content": "给我讲个今天的趣事。"
                    }
                ],
                temperature: 0.7
            })
        });

        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }

        const data = await response.json();
        // 提取模型返回的文本内容
        const resultText = data.choices[0].message.content;
        aiContent.innerText = resultText;

    } catch (error) {
        console.error("API请求失败:", error);
        aiContent.innerText = '获取内容失败，请检查网络连接或 API Key 是否正确。';
    } finally {
        aiBtn.disabled = false;
        aiBtn.innerText = '获取今日趣闻';
    }
});

        // --- 2. 录音与播放逻辑 ---
        const recordBtn = document.getElementById('recordBtn');
        const playbackBox = document.getElementById('playbackBox');
        const audioPlayer = document.getElementById('audioPlayer');
        const downloadLink = document.getElementById('downloadLink');

        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;

        recordBtn.addEventListener('click', async () => {
            if (!isRecording) {
                // 开始录音
                try {
                    // 请求麦克风权限
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = event => {
                        if (event.data.size > 0) {
                            audioChunks.push(event.data);
                        }
                    };

                    mediaRecorder.onstop = () => {
    // 1. 获取当前浏览器实际使用的录音格式类型
    // 如果获取不到，退化为通用的 audio/mp4 (对 iOS 比较友好)
    const mimeType = mediaRecorder.mimeType || 'audio/mp4'; 
    
    // 2. 使用实际类型生成 Blob
    const audioBlob = new Blob(audioChunks, { type: mimeType });
    const audioUrl = URL.createObjectURL(audioBlob);
    
    audioPlayer.src = audioUrl;
    
    // 3. 根据 mimeType 动态设置下载文件的后缀名
    let extension = 'webm'; // 默认给安卓/PC Chrome 使用 webm
    if (mimeType.includes('mp4') || mimeType.includes('aac')) {
        extension = 'm4a';  // iOS Safari 通常录制为 mp4/aac，用 m4a 后缀更规范
    } else if (mimeType.includes('ogg')) {
        extension = 'ogg';
    }

    downloadLink.href = audioUrl;
    downloadLink.download = `my_recording.${extension}`; // 动态后缀名
    playbackBox.style.display = 'flex';
    
    // 释放麦克风资源
    stream.getTracks().forEach(track => track.stop());
};

                    mediaRecorder.start();
                    isRecording = true;
                    recordBtn.innerText = '⏹ 停止录音';
                    recordBtn.classList.add('recording');
                    playbackBox.style.display = 'none';

                } catch (err) {
                    alert('无法访问麦克风，请确保已授予浏览器麦克风权限。\n' + err.message);
                }
            } else {
                // 停止录音
                mediaRecorder.stop();
                isRecording = false;
                recordBtn.innerText = '🔴 开始重新录音';
                recordBtn.classList.remove('recording');
            }
        });
    </script>
</body>
</html>
